<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Chip body -->
  <rect x="14" y="14" width="20" height="20" stroke="white" stroke-width="1.5"/>
  <!-- Inner fill -->
  <rect x="18" y="18" width="12" height="12" fill="white" opacity="0.15"/>
  <!-- Center cross -->
  <line x1="24" y1="19" x2="24" y2="29" stroke="white" stroke-width="1" opacity="0.5"/>
  <line x1="19" y1="24" x2="29" y2="24" stroke="white" stroke-width="1" opacity="0.5"/>
  <!-- Pins left -->
  <line x1="8" y1="18" x2="14" y2="18" stroke="white" stroke-width="1.5" stroke-linecap="square"/>
  <line x1="8" y1="24" x2="14" y2="24" stroke="white" stroke-width="1.5" stroke-linecap="square"/>
  <line x1="8" y1="30" x2="14" y2="30" stroke="white" stroke-width="1.5" stroke-linecap="square"/>
  <!-- Pins right -->
  <line x1="34" y1="18" x2="40" y2="18" stroke="white" stroke-width="1.5" stroke-linecap="square"/>
  <line x1="34" y1="24" x2="40" y2="24" stroke="white" stroke-width="1.5" stroke-linecap="square"/>
  <line x1="34" y1="30" x2="40" y2="30" stroke="white" stroke-width="1.5" stroke-linecap="square"/>
  <!-- Pins top -->
  <line x1="18" y1="8" x2="18" y2="14" stroke="white" stroke-width="1.5" stroke-linecap="square"/>
  <line x1="24" y1="8" x2="24" y2="14" stroke="white" stroke-width="1.5" stroke-linecap="square"/>
  <line x1="30" y1="8" x2="30" y2="14" stroke="white" stroke-width="1.5" stroke-linecap="square"/>
  <!-- Pins bottom -->
  <line x1="18" y1="34" x2="18" y2="40" stroke="white" stroke-width="1.5" stroke-linecap="square"/>
  <line x1="24" y1="34" x2="24" y2="40" stroke="white" stroke-width="1.5" stroke-linecap="square"/>
  <line x1="30" y1="34" x2="30" y2="40" stroke="white" stroke-width="1.5" stroke-linecap="square"/>
